<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<nav class="logotipo">
    <div class="logo">
        <div class="logo-principal"></div>
            StockFlow
        </div>
        <div class="nav">
            <button class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
            <button class="nav-btn" onclick="showPage('entradas')">Entradas</button>
            <button class="nav-btn" onclick="showPage('saidas')">Saídas</button>
            <button class="nav-btn" onclick="showPage('saldos')">Saldos</button>
        </div>
    </div>
</nav>
<nav class="menu-lateral"> 
        <div class="btn-expandir">
            <i class="bi bi-list" id="btn-exp"></i>
        </div>

        <ul>
            <li class="item-menu ativo">
                <a href="#">
                    <span class="icone"><i class="bi bi-house-door"></i></span>
                    <span class="txt-link">Home</span>
                </a>
            </li>
            <li class="item-menu">
                <a href="#">
                    <span class="icone"><i class="bi bi-arrow-bar-right"></i></span>
                    <span class="txt-link">Entradas</span>
                </a>
            </li>
            <li class="item-menu">
                <a href="#">
                    <span class="icone"><i class="bi bi-arrow-bar-left"></i></span>
                    <span class="txt-link">Saidas</span>
                </a>
            </li>
            <li class="item-menu">
                <a href="#">
                    <span class="icone"><i class="bi bi-database-fill"></i></span>
                    <span class="txt-link">Saldos</span>
                </a>
            </li>
            <li class="item-menu">
                <a href="#">
                    <span class="icone"><i class="bi bi-collection-fill"></i></span>
                    <span class="txt-link">Relatórios</span>
                </a>
            </li>
        </ul>
    </nav>
    <div class="dashboard">
        <div class="titulo">
            <h2>Dashboard</h2>
            <br/>
            <div class="separar"></div>
            <br/>
            <p><i class="bi bi-house-door"></i> / @eukevytos</p>
        </div>
        <div class="box">
            <div style="background:linear-gradient(45deg, #FF5370, #ff869a);" class="box-info">
                <div class="info-text">
                    <h3>Saída</h3>
                    <p>R$ -1.590</p>
                </div>
                <i class="bi bi-cash"></i>
            </div>
            <div style="background:linear-gradient(45deg, #4099ff, #73b4ff);" class="box-info">
                <div class="info-text">
                    <h3>Entrada</h3>
                    <p>R$ 4.786</p>
                </div>
                <i class="bi bi-cash"></i>
            </div>
            <div style="background:linear-gradient(45deg, #2ed8b6, #59e0c5);" class="box-info">
                <div class="info-text">
                    <h3>Total</h3>
                    <p>R$ 3.196</p>
                </div>
                <i class="bi bi-cash"></i>
            </div>
        </div>

        <div class="grafico">
            <canvas id="grafico"></canvas>
        </div>

        <div class="feed">
            <div class="feed-lista">
                <div class="feed-text">
                    <i class="bi bi-bell-fill"></i>
                    <span>Tutorial novo</span>
                </div>
                <div class="feed-tempo">
                    <h3>30 minutos atrás</h3>
                </div>
            </div>
            <div class="feed-lista">
                <div class="feed-text">
                    <i class="bi bi-bell-fill"></i>
                    <span>Tutorial novo</span>
                </div>
                <div class="feed-tempo">
                    <h3>40 minutos atrás</h3>
                </div>
            </div>
            <div class="feed-lista">
                <div class="feed-text">
                    <i class="bi bi-bell-fill"></i>
                    <span>Tutorial novo</span>
                </div>
                <div class="feed-tempo">
                    <h3>50 minutos atrás</h3>
                </div>
            </div>
            <div class="feed-lista">
                <div class="feed-text">
                    <i class="bi bi-bell-fill"></i>
                    <span>Tutorial novo</span>
                </div>
                <div class="feed-tempo">
                    <h3>1 hora atrás</h3>
                </div>
            </div>
            
        </div>
    </div>


    </div>
    
    

<script src="script.js"></script>
</body>
</html>
