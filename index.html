<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
<nav class="logotipo">
    <div class="logo">
        <div class="logo-principal"></div>
            StockFlow
        </div>
        <div class="nav">
            <button class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
            <button class="nav-btn" onclick="showPage('entradas')">Entradas</button>
            <button class="nav-btn" onclick="showPage('saidas')">Saídas</button>
            <button class="nav-btn" onclick="showPage('saldos')">Saldos</button>
        </div>
    </div>
</nav>

<nav class="menu-lateral"> 
        <div class="btn-expandir">
            <i class="bi bi-list" id="btn-exp"></i>
        </div>

        <ul>
            <li class="item-menu ativo">
                <a href="#">
                    <span class="icone"><i class="bi bi-house-door"></i></span>
                    <span class="txt-link">HOME</span>
                </a>
            </li>
            <li class="item-menu">
                <a href="#">
                    <span class="icone"><i class="bi bi-arrow-bar-right"></i></span>
                    <span class="txt-link">ENTRADAS</span>
                </a>
            </li>
            <li class="item-menu">
                <a href="#">
                    <span class="icone"><i class="bi bi-arrow-bar-left"></i></span>
                    <span class="txt-link">SAIDAS</span>
                </a>
            </li>
            <li class="item-menu">
                <a href="#">
                    <span class="icone"><i class="bi bi-database-fill"></i></span>
                    <span class="txt-link">SALDOS</span>
                </a>
            </li>
            <li class="item-menu">
                <a href="#">
                    <span class="icone"><i class="bi bi-collection-fill"></i></span>
                    <span class="txt-link">RELATÓRIOS</span>
                </a>
            </li>
        </ul>

    </nav>

<script src="script.js"></script>
</body>
</html>
